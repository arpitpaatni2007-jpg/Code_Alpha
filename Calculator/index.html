<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CALC//OS — Terminal Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Animated background -->
  <div class="bg-grid"></div>
  <canvas id="particles-canvas"></canvas>

  <main class="app-wrapper">

    <!-- Header bar -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-bracket">[</span>CALC<span class="logo-slash">//</span>OS<span class="logo-bracket">]</span>
        <span class="logo-version">v2.4.1</span>
      </div>
      <div class="header-controls">
        <button class="history-toggle" id="historyBtn" title="Calculation History" aria-label="Toggle history">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
          <span>HISTORY</span>
        </button>
        <button class="theme-toggle" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">
          <span class="theme-icon">☀️</span>
        </button>
      </div>
    </header>

    <div class="calculator-container">

      <!-- History panel -->
      <aside class="history-panel" id="historyPanel">
        <div class="history-header">
          <span>// CALCULATION LOG</span>
          <button id="clearHistoryBtn" class="clear-history-btn">PURGE</button>
        </div>
        <ul class="history-list" id="historyList">
          <li class="history-empty">No calculations yet</li>
        </ul>
      </aside>

      <!-- Main calculator -->
      <div class="calculator">

        <!-- Status bar -->
        <div class="status-bar">
          <span class="status-dot"></span>
          <span class="status-text" id="statusText">READY</span>
          <span class="status-mode" id="modeIndicator">STD</span>
        </div>

        <!-- Display -->
        <div class="display" role="region" aria-label="Calculator display">
          <div class="display-expression" id="expression" aria-live="polite"></div>
          <div class="display-result-wrapper">
            <div class="display-result" id="result" aria-live="assertive">0</div>
            <button class="copy-btn" id="copyBtn" title="Copy result" aria-label="Copy result">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            </button>
          </div>
          <div class="display-scanlines"></div>
        </div>

        <!-- Keypad -->
        <div class="keypad" role="group" aria-label="Calculator buttons">

          <!-- Row 1 -->
          <button class="btn btn-fn btn-wide" data-action="clear" aria-label="Clear all">C</button>
          <button class="btn btn-fn" data-action="sign" aria-label="Toggle sign">+/−</button>
          <button class="btn btn-fn" data-action="percent" aria-label="Percent">%</button>
          <button class="btn btn-op" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

          <!-- Row 2 -->
          <button class="btn btn-num" data-action="digit" data-value="7" aria-label="7">7</button>
          <button class="btn btn-num" data-action="digit" data-value="8" aria-label="8">8</button>
          <button class="btn btn-num" data-action="digit" data-value="9" aria-label="9">9</button>
          <button class="btn btn-op" data-action="operator" data-value="×" aria-label="Multiply">×</button>

          <!-- Row 3 -->
          <button class="btn btn-num" data-action="digit" data-value="4" aria-label="4">4</button>
          <button class="btn btn-num" data-action="digit" data-value="5" aria-label="5">5</button>
          <button class="btn btn-num" data-action="digit" data-value="6" aria-label="6">6</button>
          <button class="btn btn-op" data-action="operator" data-value="−" aria-label="Subtract">−</button>

          <!-- Row 4 -->
          <button class="btn btn-num" data-action="digit" data-value="1" aria-label="1">1</button>
          <button class="btn btn-num" data-action="digit" data-value="2" aria-label="2">2</button>
          <button class="btn btn-num" data-action="digit" data-value="3" aria-label="3">3</button>
          <button class="btn btn-op" data-action="operator" data-value="+" aria-label="Add">+</button>

          <!-- Row 5 -->
          <button class="btn btn-fn" data-action="delete" aria-label="Delete last character">⌫</button>
          <button class="btn btn-num" data-action="digit" data-value="0" aria-label="0">0</button>
          <button class="btn btn-num" data-action="decimal" aria-label="Decimal point">.</button>
          <button class="btn btn-eq" data-action="equals" aria-label="Equals">=</button>

        </div>

        <!-- Keyboard hint -->
        <div class="keyboard-hint">⌨ Keyboard input supported</div>

      </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

  </main>

  <script src="script.js"></script>
</body>
</html>
